<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>IV Rejuve — Course Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--emerald:#0C3B44;--sapphire:#103A5A;--teal:#0E8A93;--teal2:#14A3B4;--turq:#22C3D6;--blue:#12A0AE;--ink:#17242B;--muted:#5f7078;--line:#dbe3e6;--paper:#eef4f5;--card:#fff;--gold:#8A97A3;--gold2:#BAC4CD;--bad:#d8474b;--r:14px;--sans:'Inter',system-ui,sans-serif;--head:'Plus Jakarta Sans',var(--sans);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
 background:radial-gradient(900px 520px at 100% -6%,rgba(34,195,214,.12),transparent 60%),radial-gradient(760px 480px at -8% 108%,rgba(16,58,90,.08),transparent 60%),linear-gradient(180deg,#eef4f6,#f2f8f9);background-attachment:fixed;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:.9rem;color:var(--ink)}
.btn{border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:.86rem;background:linear-gradient(135deg,var(--teal2),var(--teal));color:#fff;box-shadow:0 8px 20px rgba(14,138,147,.24);transition:transform .15s,box-shadow .15s,filter .15s}
.btn:hover{transform:translateY(-1px);filter:brightness(1.04)}
.btn.ghost{background:#fff;color:var(--teal);border:1.5px solid var(--line);box-shadow:none}
.btn.ghost:hover{border-color:var(--teal);background:#f4fbfb}
.btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#2a3238;box-shadow:0 8px 20px rgba(139,152,163,.3)}
.btn.sm{padding:6px 12px;font-size:.78rem;border-radius:8px}
.btn.danger{background:#fff;color:var(--bad);border:1.5px solid #f1c9cb;box-shadow:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 18px}
.drop{width:30px;height:36px;flex:none}
/* LOGIN — dark hero */
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
 background:radial-gradient(1000px 560px at 82% -8%,rgba(34,195,214,.22),transparent 60%),radial-gradient(820px 520px at 6% 110%,rgba(30,159,192,.22),transparent 60%),linear-gradient(155deg,#0A2E38 0%,#0A2E3E 55%,#0B2A48 100%)}
.center::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;right:-140px;top:-160px;background:radial-gradient(circle,rgba(34,195,214,.16),transparent 68%);pointer-events:none}
.center::after{content:"";position:absolute;width:460px;height:460px;border-radius:50%;left:-150px;bottom:-170px;background:radial-gradient(circle,rgba(30,159,192,.14),transparent 70%);pointer-events:none}
.loginbox{position:relative;background:linear-gradient(180deg,#ffffff,#f7fbfc);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:40px 34px 34px;max-width:426px;width:100%;text-align:center;box-shadow:0 46px 100px rgba(3,20,26,.55)}
.loginbox::before{content:"";position:absolute;top:0;left:26px;right:26px;height:3px;border-radius:0 0 4px 4px;background:linear-gradient(90deg,var(--turq),var(--blue),var(--gold))}
.loginbox h1{font-family:var(--head);font-size:1.55rem;margin:16px 0 6px;letter-spacing:-.01em}
.loginbox p{color:var(--muted);font-size:.9rem;margin-bottom:20px}
.loginbox input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:12px;transition:.15s}
.loginbox input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,138,147,.12)}
.loginbox .btn{width:100%;padding:13px}
.gbtn{width:100%;padding:13px;background:#fff;color:#3c4043;border:1.5px solid var(--line);box-shadow:0 4px 12px rgba(10,50,60,.12);display:flex;align-items:center;justify-content:center;gap:10px}
.gbtn:hover{background:#f7fafb;transform:translateY(-1px);filter:none}
.brandrow{display:flex;align-items:center;justify-content:center;gap:11px}
.brandrow .drop{width:42px;height:50px;filter:drop-shadow(0 8px 18px rgba(30,159,192,.55))}
.brandrow b{font-family:var(--head);font-size:1.45rem}.brandrow b span{color:var(--gold)}
.note{font-size:.8rem;color:var(--muted);margin-top:14px}
.msg{font-size:.85rem;margin-top:12px;padding:10px 13px;border-radius:10px;text-align:left}
.msg.ok{background:rgba(14,138,147,.1);color:var(--teal)}
.msg.err{background:rgba(216,71,75,.1);color:var(--bad)}
/* TOPBAR — dark gradient */
.top{position:sticky;top:0;z-index:20;background:linear-gradient(120deg,#0C3B44,#103A5A);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 8px 28px rgba(3,20,26,.28)}
.top .wrap{display:flex;align-items:center;gap:11px;height:64px}
.top .bm{display:flex;align-items:center;gap:10px}
.top .bm .drop{filter:drop-shadow(0 3px 9px rgba(34,195,214,.55))}
.top .bm b{font-family:var(--head);font-size:1.08rem;color:#fff;white-space:nowrap}.top .bm b span{color:var(--gold2)}
.top .bm small{display:block;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(200,230,235,.72);font-weight:700}
.spacer{flex:1}
.savest{font-size:.76rem;color:rgba(210,235,238,.8);min-width:80px;text-align:right}
.savest.saving{color:var(--gold2)}.savest.saved{color:var(--turq)}
.who{font-size:.78rem;color:rgba(200,225,230,.72)}
.top .btn.ghost{background:rgba(255,255,255,.09);color:#eaf6f7;border:1px solid rgba(255,255,255,.22)}
.top .btn.ghost:hover{background:rgba(255,255,255,.17);border-color:rgba(255,255,255,.34)}
.bmtxt{display:block}
.topacts{display:flex;align-items:center;gap:8px}
.menuwrap{position:relative;display:none}
.menuBtn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.09);color:#eaf6f7;font-size:1.15rem;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center}
.menuBtn:hover{background:rgba(255,255,255,.17)}
.topmenu{position:absolute;right:0;top:42px;min-width:190px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 46px rgba(3,20,26,.3);padding:6px;display:none;z-index:40}
.topmenu.show{display:block}
.topmenu button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:600;color:var(--ink);cursor:pointer}
.topmenu button:hover{background:#f2f7f8}
.topmenu .tm-email{padding:8px 12px;font-size:.75rem;color:var(--muted);border-bottom:1px solid var(--line);margin-bottom:4px;word-break:break-all}
@media(max-width:720px){.top .wrap{gap:8px}.top .bm small{display:none}.top .bm b{font-size:1rem}.topacts{display:none}.savest{display:none}.menuwrap{display:block}.ctabs{gap:6px;padding-top:14px}.ctab{padding:7px 11px;font-size:.78rem}.cover{padding:14px 16px}.cover h2{font-size:1.12rem}}
/* COVER band */
.cover{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:16px;padding:16px 22px;border-radius:14px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(120deg,#0E5A66,#103A5A);box-shadow:0 18px 44px rgba(6,30,40,.3)}
.cover .eyebrow{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--turq);font-weight:800}
.cover h2{font-family:var(--head);font-size:1.32rem;margin-top:4px}
.cover .cdrop .drop{width:40px;height:48px;filter:drop-shadow(0 5px 12px rgba(34,195,214,.55))}
.cover::after{content:"";position:absolute;right:-46px;top:-42px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(34,195,214,.28),transparent 70%);pointer-events:none}
/* JOURNEY MAP PREVIEW */
.jmap{margin-top:14px;border-radius:14px;padding:14px 18px 8px;background:linear-gradient(120deg,#0C3B44,#0F3350);box-shadow:0 16px 40px rgba(6,30,40,.26);position:relative;overflow:hidden}
.jmap .jh{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
.jmap .jh .je{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--turq);font-weight:800}
.jmap .jh .jn2{font-size:.72rem;color:rgba(200,230,235,.7)}
.jroad{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:16px 4px 8px;position:relative;scrollbar-width:thin}
.jroad::before{content:"";position:absolute;left:14px;right:14px;top:34px;height:3px;background:linear-gradient(90deg,rgba(34,195,214,.6),rgba(20,201,198,.28));border-radius:3px}
.jn{display:flex;flex-direction:column;align-items:center;min-width:98px;position:relative;z-index:1}
.jn .jc{height:36px;display:flex;align-items:center;justify-content:center}
.jflag{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 50% 34%,#155965,#0A2C34);border:1.5px solid rgba(120,235,228,.5);display:flex;align-items:center;justify-content:center;color:#9FE0D2;font-size:.85rem;box-shadow:0 0 14px rgba(34,195,214,.32)}
.jflag.start{border-color:var(--gold);color:var(--gold2)}
.jflag.finish{background:radial-gradient(circle,#C3CDD6,#8A97A3);color:#2a3238;border-color:transparent}
.jdot{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 50% 34%,#155965,#0A2C34);border:1.5px solid rgba(159,224,210,.4);display:flex;align-items:center;justify-content:center;color:#CFE3DE;font-size:.78rem;font-weight:800}
.jlbl{margin-top:7px;font-size:.62rem;color:#BAD0CB;text-align:center;max-width:94px;line-height:1.2;white-space:normal}
.jlbl.jmod{color:#EAF1EF;font-weight:800}
.jroadwrap{position:relative}
.jnav{position:absolute;top:34px;transform:translateY(-50%);z-index:4;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.35);background:linear-gradient(135deg,#22C3C9,#12A0AE);color:#fff;font-size:1.15rem;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);cursor:pointer;transition:.15s}
.jnav:hover{filter:brightness(1.1);transform:translateY(-50%) scale(1.06)}
.jnav.left{left:2px}.jnav.right{right:2px}
/* course tabs */
.ctabs{display:flex;gap:9px;padding:18px 0 0;flex-wrap:wrap}
.ctab{padding:9px 16px;border-radius:10px;background:rgba(255,255,255,.65);color:var(--muted);font-weight:700;font-size:.84rem;border:1px solid var(--line);backdrop-filter:blur(4px);transition:.15s}
.ctab:hover{color:var(--ink)}
.ctab.on{background:#fff;color:var(--ink);border-color:var(--teal);box-shadow:0 0 0 2px rgba(14,138,147,.14)}
.ctab.addcourse{background:linear-gradient(135deg,#22C3C9,#12A0AE);color:#fff;border:1px solid transparent;box-shadow:0 5px 14px rgba(30,159,192,.28)}
.ctab.addcourse:hover{filter:brightness(1.06);color:#fff;transform:translateY(-1px)}
/* layout — two cards */
.grid{display:grid;grid-template-columns:330px 1fr;gap:16px;margin-top:16px;min-height:70vh}
.outline{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;overflow-y:auto;max-height:80vh;box-shadow:0 14px 36px rgba(10,50,60,.08)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;overflow-y:auto;max-height:80vh;box-shadow:0 14px 36px rgba(10,50,60,.08)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:56vh;padding:30px}
.empty .ed{width:72px;height:86px;filter:drop-shadow(0 12px 24px rgba(18,160,174,.4));margin-bottom:10px;animation:edfloat 4s ease-in-out infinite}
@keyframes edfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.empty h2{font-family:var(--head);font-size:1.4rem;color:var(--emerald);margin-bottom:7px}
.empty p{color:var(--muted);font-size:.9rem;max-width:400px;margin-bottom:22px}
.empty-tips{display:flex;flex-direction:column;gap:9px;width:100%;max-width:360px}
.etip{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#fbfdfe,#f4fafb);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.85rem;color:var(--ink);text-align:left}
.etip b{flex:none;width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,var(--turq),var(--teal));color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800}
.oh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.oh .ct{font-family:var(--head);font-weight:800;font-size:1.02rem;color:var(--emerald)}
.mod{border:1px solid var(--line);border-radius:12px;margin-bottom:11px;background:linear-gradient(180deg,#fff,#f6fafb);overflow:hidden}
.mod .mh{display:flex;align-items:center;gap:6px;padding:9px 10px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(14,138,147,.08),transparent)}
.mod .mh .grip{cursor:grab;color:#9fb2b8;font-size:.85rem}
.mod .mh input{flex:1;border:none;background:transparent;font-weight:700;font-size:.86rem;padding:3px;color:var(--ink)}
.mod .mh input:focus{outline:1px solid var(--line);border-radius:5px}
.mod .les-list{padding:7px;min-height:14px}
.les{display:flex;align-items:center;gap:7px;padding:8px 9px;border-radius:9px;margin:4px 0;background:#fff;border:1px solid var(--line);font-size:.84rem;transition:.12s}
.les:hover{border-color:#bfd3d7}
.les.sel{border-color:var(--teal);background:linear-gradient(90deg,rgba(14,138,147,.1),#fff);box-shadow:0 0 0 2px rgba(14,138,147,.14)}
.les .grip{cursor:grab;color:#9fb2b8}
.les .lt{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del{background:none;border:none;color:#aab4b9;font-size:1.3rem;line-height:1;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;padding:0;flex:none}
.del:hover{background:rgba(216,71,75,.12);color:var(--bad)}
.del.armed{background:var(--bad);color:#fff;transform:scale(1.06)}
.les .del{font-size:1.2rem}
.addbtn{width:100%;border:none;background:linear-gradient(135deg,#22C3C9,#12A0AE);color:#fff;border-radius:9px;padding:9px;font-weight:700;font-size:.8rem;margin-top:6px;box-shadow:0 6px 14px rgba(30,159,192,.28);transition:transform .15s,filter .15s}
.addbtn:hover{filter:brightness(1.06);transform:translateY(-1px)}
/* fields */
.fld{margin-bottom:16px}
.fld label{display:block;font-size:.7rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fld input.t,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;transition:.15s;background:#fff}
.fld input.t:focus,.fld textarea:focus,.opt input.o:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,138,147,.12)}
.fld textarea{resize:vertical;min-height:66px;line-height:1.5}
.hint{font-size:.72rem;color:var(--muted);margin-top:4px}
.sec{border:1px solid var(--line);border-left:3px solid var(--turq);border-radius:11px;padding:14px;margin-bottom:11px;background:linear-gradient(180deg,#fbfdfe,#f5fafb)}
.sec .sgrip{cursor:grab;color:#9fb2b8;float:right}
.q{border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:11px;padding:14px;margin-bottom:11px;background:linear-gradient(180deg,#fffdf8,#fbf8f1)}
.opt{display:flex;align-items:center;gap:8px;margin:6px 0}
.opt input.o{flex:1;border:1.5px solid var(--line);border-radius:9px;padding:8px 10px}
.opt .rm{color:#c2c9cb;padding:0 3px}.opt .rm:hover{color:var(--bad)}
.subttl{font-family:var(--head);font-weight:800;font-size:1.05rem;margin:24px 0 12px;padding-top:16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:9px;color:var(--emerald)}
.subttl::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--turq);box-shadow:0 0 0 3px rgba(34,195,214,.18)}
.vidprev{margin-top:9px;border-radius:11px;overflow:hidden;border:1px solid var(--line);aspect-ratio:16/9;max-width:360px;background:#000;box-shadow:0 10px 26px rgba(10,50,60,.16)}
.vidprev iframe{width:100%;height:100%;border:0;display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#0C3B44,#103A5A);color:#fff;padding:12px 20px;border-radius:11px;font-size:.85rem;z-index:60;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 16px 40px rgba(3,20,26,.4)}
.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(8,24,30,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.show{display:flex}
.modal .box{background:#fff;border-radius:16px;max-width:520px;width:100%;padding:24px;max-height:80vh;overflow:auto;box-shadow:0 40px 90px rgba(3,20,26,.4)}
.revrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:.84rem}
.pfield{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:820px){.grid{grid-template-columns:1fr}.pfield{grid-template-columns:1fr}.cover h2{font-size:1.1rem}}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="loginbox"><p>Loading…</p></div></div></div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="box" id="modalBox"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script>
var SB_URL="https://dnjvsfwdrffzawrlrrma.supabase.co";
var SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuanZzZndkcmZmemF3cmxycm1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDgxMTgsImV4cCI6MjA5ODQ4NDExOH0.6coWHPrl5IHGWex_W0Q29NU5E3hA-lyfswxPCxtbThs";
var LOGO='<svg class="drop" viewBox="0 0 64 78" fill="none"><defs><linearGradient id="dl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3AD8D2"/><stop offset=".5" stop-color="#12A0AE"/><stop offset="1" stop-color="#0B6472"/></linearGradient></defs><path d="M32 5C32 5 51 30 51 47A19 19 0 0 1 13 47C13 30 32 5 32 5Z" fill="url(#dl)"/><path d="M40 22C45 30 46 40 42 48" stroke="#C9F5F3" stroke-width="2.4" stroke-linecap="round" opacity=".7"/><path d="M24 33C20.5 39.5 21 47 26 52C22.5 46 24.5 38.5 29 34.5C27.5 33.4 25.5 33 24 33Z" fill="#fff" opacity=".5"/></svg>';
var app=document.getElementById('app');
var sb = (window.supabase && window.supabase.createClient) ? window.supabase.createClient(SB_URL, SB_ANON) : null;
var state={user:null,org:null,courses:[],cur:0,doc:null,sel:null,dirty:false,saveT:null};

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clone(o){return JSON.parse(JSON.stringify(o||{}));}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);}
function openModal(h){document.getElementById('modalBox').innerHTML=h;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});

/* ---------- boot / auth ---------- */
async function boot(){
  if(!sb){ app.innerHTML='<div class="center"><div class="loginbox"><h1>Editor unavailable</h1><p>Could not load the editor libraries. Check your connection and refresh.</p></div></div>'; return; }
  var s=(await sb.auth.getSession()).data.session;
  if(!s){ renderLogin(); return; }
  state.user=s.user; checkAccess();
}
sb && sb.auth.onAuthStateChange(function(_e,s){ if(s&&(!state.user||state.user.id!==s.user.id)){ state.user=s.user; checkAccess(); } });

function renderLogin(msg){
  app.innerHTML='<div class="center"><div class="loginbox">'
    +'<div class="brandrow">'+LOGO+'<b>IV <span>Rejuve</span></b></div>'
    +'<h1>Course Editor</h1><p>Sign in with Google to manage your courses. No passwords, no confirmation emails.</p>'

async function addCourse(){
  var name=prompt('Name the new course (e.g., "Blood Draw / Phlebotomy"):');
  if(!name||!name.trim())return; name=name.trim();
  var base=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,32)||'course';
  var slug=base+'-'+Math.random().toString(36).slice(2,5);
  var doc={slug:slug,title:name,hrs:'',mini:'',modules:[]};
  var res=await sb.from('courses').insert({org_id:state.org,slug:slug,title:name,draft:doc,sort:state.courses.length}).select('id,slug,title,draft,published,updated_at,sort').single();
  if(res.error){ toast('Could not add course: '+res.error.message); return; }
  state.courses.push(res.data);
  openCourse(state.courses.length-1);
  toast('Course added — add sections & lessons, then Publish.');
}

function wireSortables(){
  if(typeof Sortable==='undefined')return;
  var out=document.getElementById('outline');
  var modWrap=out; // modules are direct .mod children
  Sortable.create(out,{handle:'.mgrip',draggable:'.mod',animation:150,onEnd:syncFromDom});
  out.querySelectorAll('.les-list').forEach(function(ll){
    Sortable.create(ll,{group:'lessons',handle:'.grip',draggable:'.les',animation:150,onEnd:syncFromDom});
  });

function syncFromDom(){
  var byId={};
  state.doc.modules.forEach(function(m){(m.lessons||[]).forEach(function(l){byId[l.id]=l;});});
  var mods=[];
  document.querySelectorAll('#outline .mod').forEach(function(modEl){
    var mid=+modEl.getAttribute('data-mid');
    var orig=state.doc.modules[mid]||{};
    var lessons=[];
    modEl.querySelectorAll('.les').forEach(function(le){ var l=byId[le.getAttribute('data-lid')]; if(l)lessons.push(l); });
    mods.push({title:orig.title,lessons:lessons});
  });
  state.doc.modules=mods;
  renderOutline(); wireSortables(); scheduleSave();
}

function addModule(){ state.doc.modules.push({title:'New section',lessons:[]}); renderOutline(); wireSortables(); scheduleSave(); }
function armDel(btn,type,a,b){
  if(btn.classList.contains('armed')){
    clearTimeout(btn._t); btn.classList.remove('armed');
    var msg={module:'Delete this section and its lessons?',lesson:'Delete this lesson?',section:'Delete this content section?',question:'Delete this question?'}[type]||'Delete this?';
    if(!confirm(msg))return;
    if(type==='module')delModule(a); else if(type==='lesson')delLesson(a,b); else if(type==='section')delSection(a); else if(type==='question')delQ(a);
    return;
  }
  var all=document.querySelectorAll('.del.armed'); for(var i=0;i<all.length;i++){all[i].classList.remove('armed');clearTimeout(all[i]._t);}
  btn.classList.add('armed'); btn.title='Tap again to delete';
  btn._t=setTimeout(function(){btn.classList.remove('armed');},2800);
}

async function aiLesson(mi){
  var pa=document.getElementById('aiPrompt'); var p=(pa?pa.value:'').trim();
  var st=document.getElementById('aiStatus'); var go=document.getElementById('aiGo');
  if(!p){ if(st)st.innerHTML='<div class="msg err">Describe the lesson first.</div>'; return; }
  if(go){ go.disabled=true; go.textContent='✨ Drafting…'; }
  if(st)st.innerHTML='<div class="msg ok">Researching and writing your lesson — this usually takes 15–30 seconds…</div>';
  try{
    var sess=(await sb.auth.getSession()).data.session;
    var course=(state.courses[state.cur]&&state.courses[state.cur].title)||'';
    var resp=await fetch(SB_URL+'/functions/v1/generate-lesson',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(sess?sess.access_token:SB_ANON),'apikey':SB_ANON},body:JSON.stringify({prompt:p,course:course})});
    var data=await resp.json().catch(function(){return {};});
    if(!resp.ok||!data.lesson){ if(st)st.innerHTML='<div class="msg err">'+esc(data.error||('Could not generate (error '+resp.status+').'))+'</div>'; if(go){go.disabled=false;go.textContent='✨ Let AI draft it';} return; }
    var ls=data.lesson; ls.id='l_'+Math.random().toString(36).slice(2,9); ls.sections=ls.sections||[]; ls.quiz=ls.quiz||[];
    state.doc.modules[mi].lessons.push(ls);
    renderOutline(); wireSortables(); selectLesson(mi, state.doc.modules[mi].lessons.length-1); scheduleSave();
    closeModal(); toast('AI draft added — review, edit, then Publish.');
  }catch(e){ if(st)st.innerHTML='<div class="msg err">'+esc(String(e))+'</div>'; if(go){go.disabled=false;go.textContent='✨ Let AI draft it';} }
}

function parseVideo(u){
  u=(u||'').trim(); if(!u)return null;
  var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{6,})/); if(m)return {provider:'youtube',id:m[1]};
  m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/); if(m)return {provider:'vimeo',id:m[1]};
  if(/^[\w-]{6,}$/.test(u))return {provider:'youtube',id:u};
  return null;
}
function videoUrl(v){ if(!v)return ''; return v.provider==='vimeo'?'https://vimeo.com/'+v.id:'https://youtu.be/'+v.id; }
function embedUrl(v){ if(!v)return ''; return v.provider==='vimeo'?'https://player.vimeo.com/video/'+v.id:'https://www.youtube.com/embed/'+v.id; }

function scheduleSave(){ setSave('saving'); clearTimeout(state.saveT); state.saveT=setTimeout(saveDraft,1100); }
async function saveDraft(){
  var c=state.courses[state.cur];
  var {error}=await sb.from('courses').update({draft:state.doc,title:state.doc.title,updated_at:new Date().toISOString()}).eq('id',c.id);
  if(error){ setSave('unsaved'); toast('Save failed: '+error.message); return; }
  c.draft=clone(state.doc); setSave('saved');
}
async function publish(){
  await saveDraft();
  if(!confirm('Publish these changes? Learners will see them on their next visit.'))return;
  var c=state.courses[state.cur]; var now=new Date().toISOString();
  var up=await sb.from('courses').update({published:state.doc,published_at:now}).eq('id',c.id);
  if(up.error){ toast('Publish failed: '+up.error.message); return; }
  await sb.from('course_revisions').insert({course_id:c.id,doc:state.doc,editor_email:state.user.email,note:'Published'});
  c.published=clone(state.doc);
  toast('Published ✓  Live for learners.');
}
function previewPublished(){ window.open('/training','_blank'); }
async function openHistory(){
  var c=state.courses[state.cur];
  openModal('<h3 style="font-family:var(--head);margin-bottom:6px">Version history</h3><p style="color:var(--muted);font-size:.84rem;margin-bottom:10px">Restore brings a past version back into your draft (you can still edit before publishing).</p><div id="revs">Loading…</div><div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="closeModal()">Close</button></div>');
  var {data,error}=await sb.from('course_revisions').select('id,note,editor_email,created_at').eq('course_id',c.id).order('created_at',{ascending:false}).limit(30);
  var box=document.getElementById('revs');
  if(error){ box.innerHTML='<p class="msg err">'+esc(error.message)+'</p>'; return; }
  if(!data||!data.length){ box.innerHTML='<p style="color:var(--muted);font-size:.85rem">No published versions yet.</p>'; return; }
  box.innerHTML=data.map(function(r){var dt=new Date(r.created_at).toLocaleString();return '<div class="revrow"><div><b>'+dt+'</b><br><span style="color:var(--muted);font-size:.78rem">'+esc(r.editor_email||'')+' · '+esc(r.note||'')+'</span></div><button class="btn ghost sm" onclick="restoreRev('+r.id+')">Restore</button></div>';}).join('');
}
async function restoreRev(id){
  if(!confirm('Restore this version into your draft?'))return;
  var {data,error}=await sb.from('course_revisions').select('doc').eq('id',id).single();
  if(error){ toast('Restore failed'); return; }
  state.doc=clone(data.doc); if(!state.doc.modules)state.doc.modules=[]; state.sel=null;
  closeModal(); renderEditor(); scheduleSave(); toast('Restored into draft — review, then Publish.');
}

boot();
</script>
