<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumevity — Training Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Mulish:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --emerald:#0C3B33;--emerald-2:#0E5A52;--sapphire:#102A43;--amethyst:#3B2A4A;
    --white:#FBFAF6;--pearl:#F1EFE9;--page:#F4F1E9;--stone:#D9D5CC;
    --gold:#C9A24B;--champagne:#E3CE9A;--gold-deep:#A07E2E;
    --ink:#1c2b27;--muted:#5d6b66;--ok:#2f7d5b;--no:#c0563f;
    --serif:'Fraunces',Georgia,serif;--sans:'Mulish',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--sans);color:var(--ink);background:var(--page);line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:500;line-height:1.15;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;} button{font-family:var(--sans);cursor:pointer;border:none;}
  .app{display:grid;grid-template-columns:262px 1fr;min-height:100vh;}
  .side{background:linear-gradient(170deg,var(--emerald),#0a2a24 80%);color:var(--white);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .side .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;}
  .side .brand .logo{width:30px;height:30px;}
  .side .brand .name{font-family:var(--serif);font-size:1.35rem;font-weight:600;}
  .side .brand .name b{color:var(--champagne);font-weight:600;}
  .side .navlbl{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(227,206,154,.7);font-weight:700;padding:12px 10px 6px;}
  .side .nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:rgba(251,250,246,.82);font-size:.88rem;font-weight:600;margin-bottom:2px;}
  .side .nav a:hover{background:rgba(227,206,154,.08);color:#fff;}
  .side .nav a.active{background:rgba(227,206,154,.16);color:#fff;}
  .side .nav a .ti{width:17px;height:17px;flex:none;stroke:currentColor;fill:none;stroke-width:1.8;}
  .side .nav a .tag{margin-left:auto;font-size:.54rem;letter-spacing:.05em;text-transform:uppercase;background:rgba(227,206,154,.18);color:var(--champagne);padding:2px 7px;border-radius:50px;}
  .side .nav a .gck{margin-left:auto;color:var(--champagne);}
  .side .prog{margin-top:auto;background:rgba(251,250,246,.06);border:1px solid rgba(227,206,154,.16);border-radius:14px;padding:14px;}
  .side .prog .pt{font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--champagne);font-weight:700;margin-bottom:8px;}
  .side .prog .bar{height:7px;border-radius:6px;background:rgba(251,250,246,.12);overflow:hidden;}
  .side .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--champagne),var(--gold));transition:width .4s;}
  .side .prog .pn{font-size:.74rem;color:rgba(251,250,246,.74);margin-top:8px;}
  .main{min-width:0;}
  .ribbon{background:var(--emerald);color:rgba(251,250,246,.82);font-size:.72rem;text-align:center;padding:8px 20px;}
  .ribbon b{color:var(--champagne);font-weight:700;}
  .content{padding:28px 40px 60px;max-width:900px;}
  .crumb{font-size:.8rem;color:var(--muted);margin-bottom:12px;}
  .crumb a{color:var(--emerald-2);font-weight:600;}
  .eyebrow{font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--gold-deep);}
  .head h1{font-size:1.95rem;color:var(--emerald);margin:8px 0 6px;}
  .head p{color:var(--muted);font-size:1rem;max-width:640px;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:.9rem;padding:12px 22px;border-radius:50px;}
  .btn .ti{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
  .btn-gold{background:linear-gradient(135deg,var(--champagne),var(--gold));color:#3a2e0e;}
  .btn-dark{background:var(--emerald);color:#fff;} .btn-ghost{background:transparent;color:var(--emerald);border:1.5px solid var(--stone);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}

  /* course cards */
  .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px;}
  .tcard{background:var(--white);border:1px solid var(--stone);border-radius:16px;padding:20px;cursor:pointer;transition:transform .15s,border-color .15s;}
  .tcard:hover{transform:translateY(-3px);border-color:var(--gold);}
  .tcard .tic{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;background:linear-gradient(160deg,#0d3e36,#0a2a24);}
  .tcard .tic svg{width:30px;height:30px;}
  .tcard h3{font-size:1.1rem;color:var(--emerald);margin-bottom:3px;}
  .tcard .ts{font-size:.78rem;color:var(--muted);margin-bottom:12px;}
  .tcard .tb{height:7px;border-radius:6px;background:var(--pearl);overflow:hidden;margin-bottom:6px;}
  .tcard .tb i{display:block;height:100%;background:linear-gradient(90deg,var(--champagne),var(--gold));}
  .tcard .tm{font-size:.74rem;color:var(--muted);} .tcard .grad{color:var(--ok);font-weight:700;}

  /* stages / lessons */
  .stage{margin-bottom:14px;}
  .stage .sh{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .stage .snum{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:#3a2e0e;background:linear-gradient(135deg,var(--champagne),var(--gold));}
  .stage .sh h3{font-size:1.05rem;color:var(--emerald);}
  .lessons{display:flex;flex-direction:column;gap:8px;}
  .lrow{display:flex;align-items:center;gap:13px;background:var(--white);border:1px solid var(--stone);border-radius:12px;padding:13px 16px;cursor:pointer;transition:border-color .15s,transform .15s;}
  .lrow:hover{border-color:var(--gold);transform:translateX(2px);}
  .lrow .lic{width:40px;height:40px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--pearl);overflow:hidden;}
  .lrow .lic svg{width:100%;height:100%;}
  .lrow .lic.done{background:linear-gradient(135deg,var(--champagne),var(--gold));}
  .lrow .lic.done .ti{width:18px;height:18px;stroke:#3a2e0e;fill:none;stroke-width:2.4;}
  .lrow .lt{font-weight:700;font-size:.95rem;color:var(--ink);}
  .lrow .ld{font-size:.76rem;color:var(--muted);}
  .lrow .lmeta{margin-left:auto;}
  .pill{font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:50px;}
  .pill.done{background:#eaf3ee;color:var(--ok);} .pill.todo{background:var(--pearl);color:var(--muted);}

  /* lesson view */
  .illo{background:linear-gradient(160deg,#0e3a33,#0a2a24);border:1px solid rgba(227,206,154,.2);border-radius:16px;padding:18px;margin-bottom:16px;display:flex;justify-content:center;}
  .illo svg{width:100%;max-width:420px;height:auto;}
  .lead{font-size:1.05rem;color:var(--ink);margin-bottom:16px;}
  /* reveal cards */
  .rcard{background:var(--white);border:1px solid var(--stone);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .rhead{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;}
  .rhead .rn{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#3a2e0e;background:linear-gradient(135deg,var(--champagne),var(--gold));}
  .rhead .rt{font-weight:700;font-size:1rem;color:var(--emerald);}
  .rhead .rd{font-size:.86rem;color:var(--muted);}
  .rhead .chev{margin-left:auto;color:var(--gold-deep);transition:transform .2s;font-size:1.1rem;}
  .rcard.open .chev{transform:rotate(180deg);}
  .rmore{display:none;padding:0 18px 16px 56px;}
  .rcard.open .rmore{display:block;}
  .rmore ul{list-style:none;margin:0 0 8px;}
  .rmore li{position:relative;padding-left:18px;margin-bottom:6px;font-size:.9rem;}
  .rmore li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold);}
  .rmore .safe{font-size:.84rem;color:#5a4413;background:#f7f1e2;border:1px solid #e8d9b3;border-radius:10px;padding:9px 12px;}
  .rmore .safe b{color:#3a2e0e;}

  /* interactive: sites */
  .inter{background:var(--white);border:1px solid var(--stone);border-radius:16px;padding:20px;margin:16px 0;}
  .inter .il{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--gold-deep);}
  .inter h3{font-size:1.15rem;color:var(--emerald);margin:6px 0 4px;}
  .inter .iq{font-size:.95rem;color:var(--ink);margin-bottom:12px;}
  .sitebox{display:flex;justify-content:center;}
  .sitebox svg{width:100%;max-width:420px;height:auto;}
  .hot{cursor:pointer;transition:.15s;}
  .hot:hover{filter:brightness(1.12);}
  .fb{margin-top:12px;font-size:.9rem;border-radius:10px;padding:10px 13px;display:none;}
  .fb.show{display:block;}
  .fb.ok{background:#eef6f0;border:1px solid #cfe6d8;color:var(--ok);}
  .fb.no{background:#fbeee9;border:1px solid #e7cdbc;color:var(--no);}
  /* quiz */
  .q{margin-bottom:16px;}
  .qq{font-weight:700;font-size:.98rem;color:var(--emerald);margin-bottom:10px;}
  .qopt{display:flex;align-items:center;gap:10px;border:1px solid var(--stone);border-radius:11px;padding:12px 15px;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:.92rem;}
  .qopt:hover{border-color:var(--gold);}
  .qopt.correct{border-color:var(--ok);background:#eef6f0;}
  .qopt.wrong{border-color:var(--no);background:#fbeee9;}
  .qopt .mk{margin-left:auto;font-weight:800;font-size:.8rem;}
  .qopt.correct .mk{color:var(--ok);} .qopt.wrong .mk{color:var(--no);}
  .qwhy{font-size:.84rem;color:var(--muted);margin:2px 0 4px;padding-left:2px;display:none;}
  .qwhy.show{display:block;}
  .qscore{font-weight:700;color:var(--emerald);margin-top:6px;}

  .lnav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  /* grad + ce (reuse) */
  .grad{text-align:center;background:radial-gradient(600px 340px at 50% -10%, rgba(227,206,154,.22), transparent 60%),linear-gradient(160deg,var(--emerald),var(--sapphire));color:#fff;border-radius:20px;padding:44px 34px;border:1px solid rgba(227,206,154,.22);}
  .grad .seal{width:100px;height:100px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--champagne),var(--gold));display:flex;align-items:center;justify-content:center;}
  .grad .seal .ti{width:50px;height:50px;stroke:#3a2e0e;fill:none;stroke-width:1.8;}
  .grad .ge{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--champagne);font-weight:700;}
  .grad h1{font-size:2rem;color:#fff;margin:8px 0;}
  .grad p{color:rgba(251,250,246,.84);max-width:500px;margin:0 auto 14px;}
  .cert{background:var(--white);border:1px solid var(--stone);border-radius:14px;max-width:500px;margin:20px auto 0;padding:24px;}
  .cert .cl{font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;}
  .cert .cn{font-family:var(--serif);font-size:1.4rem;color:var(--emerald);margin:6px 0;}
  .cert .cd{font-size:.82rem;color:var(--muted);}
  .gradlist{display:flex;flex-direction:column;gap:12px;}
  .gradrow{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--stone);border-radius:14px;padding:16px 20px;}
  .gradrow .gi{width:40px;height:40px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--pearl);overflow:hidden;}
  .gradrow .gi svg{width:100%;height:100%;}
  .gradrow.done .gi{background:linear-gradient(135deg,var(--champagne),var(--gold));}
  .gradrow.done .gi .ti{width:20px;height:20px;stroke:#3a2e0e;fill:none;stroke-width:2.2;}
  .gradrow h4{font-size:1.02rem;color:var(--emerald);} .gradrow p{font-size:.8rem;color:var(--muted);} .gradrow .ga{margin-left:auto;}
  .cehead{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:linear-gradient(160deg,#0d3e36,#0a2a24);color:#fff;border-radius:16px;padding:22px 26px;margin-bottom:22px;border:1px solid rgba(227,206,154,.2);}
  .cehead h2{font-size:1.4rem;color:#fff;} .cehead p{font-size:.86rem;color:rgba(251,250,246,.78);max-width:460px;}
  .cehead .cei{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--champagne);font-weight:700;}
  .cehours{text-align:center;} .cehours .n{font-family:var(--serif);font-size:2.4rem;color:var(--champagne);line-height:1;} .cehours .l{font-size:.72rem;color:rgba(251,250,246,.7);}
  .cegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .cecard{background:var(--white);border:1px solid var(--stone);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;}
  .cecard .chrs{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--gold-deep);background:#f7f1e2;border:1px solid #e8d9b3;padding:3px 9px;border-radius:50px;align-self:flex-start;margin-bottom:8px;}
  .cecard h4{font-size:1.02rem;color:var(--emerald);margin-bottom:4px;} .cecard p{font-size:.83rem;color:var(--muted);margin-bottom:14px;flex:1;}
  .lockmsg{background:#f7f1e2;border:1px solid #e8d9b3;border-radius:14px;padding:20px 22px;color:#5a4413;} .lockmsg b{color:#3a2e0e;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--emerald);color:#fff;padding:14px 22px;border-radius:14px;display:flex;align-items:center;gap:12px;box-shadow:0 18px 46px rgba(8,30,40,.4);opacity:0;pointer-events:none;transition:.35s;z-index:100;border:1px solid rgba(227,206,154,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .seal{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--champagne),var(--gold));display:flex;align-items:center;justify-content:center;}
  .toast .seal .ti{width:19px;height:19px;stroke:#3a2e0e;fill:none;stroke-width:2.2;} .toast b{color:var(--champagne);}
  @media(max-width:860px){
    .app{grid-template-columns:1fr;} .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;gap:6px;}
    .side .brand{padding:0 8px 0 0;} .side .navlbl,.side .prog{display:none;} .side .nav{display:flex;flex-wrap:wrap;gap:4px;} .side .nav a{margin:0;}
    .content{padding:22px 18px 50px;} .tgrid,.cegrid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 48"><defs><linearGradient id="d" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#0E5A52"/><stop offset=".55" stop-color="#C9A24B"/><stop offset="1" stop-color="#E3CE9A"/></linearGradient></defs><path d="M20 2 C20 2 36 22 36 33 A16 16 0 1 1 4 33 C4 22 20 2 20 2 Z" fill="url(#d)"/><path d="M20 16 C20 16 28 27 28 33 A8 8 0 1 1 12 33 C12 27 20 16 20 16 Z" fill="#FBFAF6" opacity=".18"/></svg>
      <span class="name">Lume<b>vity</b></span>
    </div>
    <div class="navlbl">Training Center</div>
    <nav class="nav"><a data-view="dashboard" onclick="go('dashboard')"><svg class="ti" viewBox="0 0 24 24"><path d="M4 13h7V4H4zM13 21h7V11h-7zM4 21h7v-5H4zM13 8h7V4h-7z"/></svg>Dashboard</a></nav>
    <div class="navlbl">Courses</div>
    <nav class="nav" id="navCourses">
      <a data-track="iv" onclick="go('path','iv')"><svg class="ti" viewBox="0 0 24 24"><path d="M4 19V5l8 3 8-3v14l-8 3z"/></svg>IV Insertion<span class="gck" id="gckiv"></span></a>
      <a data-track="im" onclick="go('path','im')"><svg class="ti" viewBox="0 0 24 24"><path d="M5 19l5-5M9 11l5-5 4 4-5 5z"/></svg>IM Injection<span class="gck" id="gckim"></span></a>
      <a data-track="subq" onclick="go('path','subq')"><svg class="ti" viewBox="0 0 24 24"><path d="M6 18l6-6M11 13l5-5 3 3-5 5z"/></svg>Subcutaneous<span class="gck" id="gcksubq"></span></a>
    </nav>
    <div class="navlbl">Progress</div>
    <nav class="nav">
      <a data-view="grad" onclick="go('grad')"><svg class="ti" viewBox="0 0 24 24"><path d="M2 9l10-5 10 5-10 5z"/><path d="M6 11v4c0 1.5 3 3 6 3s6-1.5 6-3v-4"/></svg>Graduation</a>
      <a data-view="ce" id="ceNav" onclick="go('ce')"><svg class="ti" viewBox="0 0 24 24"><path d="M12 2l2.4 5 5.6.8-4 4 .9 5.6L12 19l-5 2.4.9-5.6-4-4 5.6-.8z"/></svg>CE Center<span class="tag" id="ceTag">Locked</span></a>
      <a data-view="video" onclick="go('video')"><svg class="ti" viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M10 9l5 3-5 3z"/></svg>Video Library</a>
    </nav>
    <div class="prog"><div class="pt" id="goalLbl">Goal: Graduate</div><div class="bar"><i id="sideProg" style="width:0%"></i></div><div class="pn" id="sideProgN">0 of 0</div></div>
  </aside>
  <div class="main">
    <div class="ribbon">Educational training · Practice hands-on skills <b>only under qualified supervision</b> within your scope of practice.</div>
    <div class="content" id="view"></div>
  </div>
</div>
<div class="toast" id="toast"><div class="seal"><svg class="ti" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div><div id="toastMsg">Done</div></div>

<script>
/* ---------- SVG illustrations ---------- */
function svgArm(interactive){
  var hot=interactive?'hot':'';
  return '<svg viewBox="0 0 340 190">'
    +'<rect x="18" y="55" width="304" height="80" rx="40" fill="#f3ecdb" stroke="#d9d5cc"/>'
    +'<path d="M40 100 C130 78,210 116,300 92" stroke="#5f8ea0" stroke-width="7" fill="none" opacity=".55"/>'
    +'<path d="M40 118 C140 134,215 104,300 124" stroke="#5f8ea0" stroke-width="5" fill="none" opacity=".4"/>'
    +'<circle class="'+hot+'" data-id="good" cx="158" cy="106" r="13" fill="#C9A24B" opacity=".9"/>'
    +'<circle class="'+hot+'" data-id="valve" cx="245" cy="96" r="13" fill="#C9A24B" opacity=".9"/>'
    +'<circle class="'+hot+'" data-id="hand" cx="62" cy="103" r="13" fill="#C9A24B" opacity=".9"/>'
    +(interactive?'':'<text x="158" y="150" fill="#E3CE9A" font-size="11" text-anchor="middle" font-family="Mulish">forearm vein — ideal</text>')
    +'</svg>';
}
function svgIM(interactive){
  var hot=interactive?'hot':'';
  return '<svg viewBox="0 0 340 210">'
    +'<circle cx="80" cy="34" r="16" fill="#f3ecdb" stroke="#d9d5cc"/>'
    +'<rect x="58" y="54" width="44" height="86" rx="16" fill="#f3ecdb" stroke="#d9d5cc"/>'
    +'<rect x="40" y="60" width="20" height="64" rx="10" fill="#f3ecdb" stroke="#d9d5cc"/>'
    +'<rect x="64" y="138" width="34" height="60" rx="14" fill="#f3ecdb" stroke="#d9d5cc"/>'
    +'<ellipse class="'+hot+'" data-id="deltoid" cx="50" cy="72" rx="12" ry="14" fill="#C9A24B" opacity=".9"/>'
    +'<ellipse class="'+hot+'" data-id="ventro" cx="88" cy="150" rx="13" ry="12" fill="#C9A24B" opacity=".9"/>'
    +'<ellipse class="'+hot+'" data-id="vastus" cx="80" cy="176" rx="12" ry="15" fill="#C9A24B" opacity=".9"/>'
    +'<text x="150" y="70" fill="#E3CE9A" font-size="12" font-family="Mulish">Deltoid — small volumes</text>'
    +'<text x="150" y="150" fill="#E3CE9A" font-size="12" font-family="Mulish">Ventrogluteal — preferred</text>'
    +'<text x="150" y="180" fill="#E3CE9A" font-size="12" font-family="Mulish">Vastus lateralis — thigh</text>'
    +'</svg>';
}
function svgSubQ(interactive){
  var hot=interactive?'hot':'';
  return '<svg viewBox="0 0 340 200">'
    +'<rect x="120" y="24" width="100" height="150" rx="30" fill="#f3ecdb" stroke="#d9d5cc"/>'

      var id=el2.getAttribute('data-id');var ok=id===it.correct;var fb=el('sfb');
      zone.querySelectorAll('.hot').forEach(x=>x.setAttribute('stroke','none'));

    });});
  } else if(it.type==='quiz'||it.type==='exam'){
    const isExam=it.type==='exam';const total=it.questions.length;
    let inner='<div class="inter"><div class="il">'+(isExam?'Graduation quiz':'Quick check')+'</div><h3>'+(isExam?'Pass '+it.pass+' of '+total+' to graduate':'Instant feedback')+'</h3>';
    it.questions.forEach((q,qi)=>{inner+='<div class="q" data-qi="'+qi+'"><div class="qq">'+(qi+1)+'. '+q.q+'</div>'+q.opts.map((o,oi)=>'<div class="qopt" data-oi="'+oi+'">'+o+'<span class="mk"></span></div>').join('')+'<div class="qwhy"></div></div>';});
    inner+='<div class="qscore" id="qscore"></div></div>';
    zone.innerHTML=inner;
    const answered={};
    zone.querySelectorAll('.q').forEach(qEl=>{
      const qi=+qEl.getAttribute('data-qi');const q=it.questions[qi];
      qEl.querySelectorAll('.qopt').forEach(opt=>{opt.addEventListener('click',function(){
        if(answered[qi]!==undefined)return;const oi=+opt.getAttribute('data-oi');answered[qi]=oi;
        qEl.querySelectorAll('.qopt').forEach((o2,i2)=>{if(i2===q.a){o2.classList.add('correct');o2.querySelector('.mk').textContent='✓';}else if(i2===oi){o2.classList.add('wrong');o2.querySelector('.mk').textContent='✕';}});
        const why=qEl.querySelector('.qwhy');why.textContent=q.why;why.classList.add('show');
        updateScore();
      });});
    });
    function updateScore(){let s=0;Object.keys(answered).forEach(k=>{if(answered[k]===it.questions[k].a)s++;});const done=Object.keys(answered).length;
      const sc=el('qscore');
      if(done===total){state.lastScore=s;
        if(isExam){const pass=s>=it.pass;sc.innerHTML=s+' / '+total+' — '+(pass?'<span style="color:var(--ok)">passed!</span>':'<span style="color:var(--no)">need '+it.pass+' to pass</span>');
          const b=el('doneBtn');
          if(pass){b.disabled=false;b.textContent='Claim your graduation';b.onclick=function(){graduate(state.track);};}
          else{b.disabled=false;b.textContent='Retake the quiz';b.onclick=function(){render();};}
        } else {sc.textContent=s+' / '+total+' correct';}
      } else {sc.textContent=done+' / '+total+' answered';}
    }
  }
}

function completeLesson(id){const wasNew=!state.completed.has(id);state.completed.add(id);if(CE_LESSONS[id]&&wasNew){state.ceHours+=CE_LESSONS[id].ceHours;state.ceDone.add(id);}toast(getLesson(id).title+' complete');go(state.from==='ce'?'ce':'path');}
function graduate(track){state.gradTracks.add(track);trackIds(track).forEach(i=>state.completed.add(i));state.track=track;state._celebrate=track;state.view='grad';setActive('grad',null);render();window.scrollTo(0,0);toast('Congratulations — '+TRACKS[track].short+' Graduate!');}

function tplGrad(){
  if(state._celebrate&&state.gradTracks.has(state._celebrate)){const t=state._celebrate;state._celebrate=null;
    return '<div class="grad"><div class="seal"><svg class="ti" viewBox="0 0 24 24"><path d="M2 9l10-5 10 5-10 5z"/><path d="M6 11v4c0 1.6 3 3 6 3s6-1.4 6-3v-4"/></svg></div><div class="ge">Lumevity Graduate</div><h1>Congratulations!</h1><p>You\'ve completed the '+TRACKS[t].name+' course. This reflects knowledge readiness — hands-on competency is validated by your supervisor.</p><div class="cert"><div class="cl">Certificate of Graduation</div><div class="cn">'+TRACKS[t].name+'</div><div class="cd">Awarded by Lumevity · Lacey Smith, FNP-C · '+new Date().toLocaleDateString()+'</div></div><div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-gold" onclick="go(\'ce\')">Enter the CE Center</button><button class="btn btn-ghost" style="border-color:rgba(227,206,154,.5);color:#fff" onclick="go(\'grad\')">All credentials</button></div></div>';
  }
  const rows=['iv','im','subq'].map(t=>{const{done,total}=pct(t);const g=state.gradTracks.has(t);
    return '<div class="gradrow '+(g?'done':'')+'"><div class="gi">'+(g?'<svg class="ti" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>':svgMini(t==='iv'?'arm':t==='im'?'im':'subq'))+'</div><div><h4>'+TRACKS[t].name+'</h4><p>'+(g?'Graduated — credential earned':done+' of '+total+' lessons')+'</p></div><div class="ga">'+(g?'<span class="pill done">Graduate</span>':'<button class="btn btn-ghost" onclick="go(\'path\',\''+t+'\')">Continue</button>')+'</div></div>';}).join('');
  return '<div class="head"><span class="eyebrow">Graduation</span><h1>Your credentials</h1><p>Graduate from each course to earn its credential. Your first one unlocks the CE Center.</p></div><div class="gradlist">'+rows+'</div>';
}
function tplCE(){
  if(!anyGrad())return '<div class="head"><span class="eyebrow">CE Center</span><h1>Unlocks at graduation</h1></div><div class="lockmsg"><b>Finish a course and pass its quiz</b> to open the CE Center — then come back monthly for fresh credit.</div>';
  return '<div class="cehead"><div><div class="cei">Continuing Education</div><h2>Keep your skills sharp</h2><p>New modules monthly. Earn contact hours and stay current.</p></div><div class="cehours"><div class="n">'+state.ceHours.toFixed(1)+'</div><div class="l">contact hours</div></div></div><div class="cegrid">'+CE.map(m=>{const ls=CE_LESSONS[m.id];const done=state.ceDone.has(m.id);return '<div class="cecard"><span class="chrs">'+m.hours.toFixed(1)+' CE hr</span><h4>'+ls.title+'</h4><p>'+m.desc+'</p><button class="btn '+(done?'btn-ghost':'btn-gold')+'" onclick="openLesson(\''+m.id+'\',\'ce\')">'+(done?'Revisit':'Start module')+'</button></div>';}).join('')+'</div><p style="text-align:center;color:var(--muted);font-size:.82rem;margin-top:20px">CE credit pursued through appropriate accreditors. Hours shown are illustrative for this MVP.</p>';
}
function tplVideo(){const v=[{t:"Reading & choosing a vein",s:"IV"},{t:"The IV insertion, start to finish",s:"IV"},{t:"IM landmarking the ventrogluteal",s:"IM"},{t:"Subcutaneous pinch & angle",s:"SubQ"}];
  return '<div class="head"><span class="eyebrow">Video Library</span><h1>Demonstration videos</h1><p>Filmed walkthroughs to pair with each lesson — in production.</p></div><div class="cegrid">'+v.map(x=>'<div class="cecard"><span class="chrs" style="background:#eef1ee;color:var(--emerald-2);border-color:#dfe5df">Video</span><h4>'+x.t+'</h4><p>'+x.s+'</p><button class="btn btn-ghost" disabled>Coming soon</button></div>').join('')+'</div>';
}

let tT;function toast(m){el('toastMsg').innerHTML='<b>Nice work.</b> '+m;const t=el('toast');t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2800);}
function flash(m){el('toastMsg').textContent=m;const t=el('toast');t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2000);}

render();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SB_URL="https://dnjvsfwdrffzawrlrrma.supabase.co";
  var SB_KEY="sb_publishable_MX9URc_fMZ37AEHEHYyIDg_bXZK3UHZ";
  if(!window.supabase){ console.warn("Supabase JS not loaded (offline demo mode)."); return; }
  var sb = window.supabase.createClient(SB_URL, SB_KEY);
  window._sb = sb; var userId = null;
  var bar=document.createElement('div'); bar.id='authbar';
  bar.style.cssText='position:fixed;top:8px;right:12px;z-index:300;display:flex;align-items:center;gap:8px;background:rgba(12,59,51,.96);color:#FBFAF6;border:1px solid rgba(227,206,154,.3);border-radius:50px;padding:6px 12px;font:600 12px Mulish,system-ui,sans-serif;box-shadow:0 8px 24px rgba(8,30,40,.35)';
  document.body.appendChild(bar);
  function renderBar(email){
    if(email){ bar.innerHTML='<span style="color:#E3CE9A">&#9679;</span> '+email+' <button id="lo" style="margin-left:4px;background:transparent;border:1px solid rgba(227,206,154,.4);color:#E3CE9A;border-radius:50px;padding:4px 10px;cursor:pointer;font:inherit">Sign out</button>';
      document.getElementById('lo').onclick=async function(){ await sb.auth.signOut(); location.reload(); }; }
    else { bar.innerHTML='<input id="em" placeholder="you@email.com" style="background:rgba(251,250,246,.1);border:1px solid rgba(227,206,154,.3);color:#fff;border-radius:50px;padding:6px 10px;font:inherit;width:150px" /> <button id="si" style="background:linear-gradient(135deg,#E3CE9A,#C9A24B);border:none;color:#3a2e0e;border-radius:50px;padding:6px 12px;cursor:pointer;font:inherit;font-weight:700">Save progress</button>';
      document.getElementById('si').onclick=async function(){ var em=document.getElementById('em').value.trim(); if(!em) return; var r=await sb.auth.signInWithOtp({email:em, options:{emailRedirectTo:location.href}}); bar.innerHTML = r.error ? ('<span>'+r.error.message+'</span>') : '<span style="color:#E3CE9A">Check your email for a sign-in link &#9993;</span>'; }; }
  }
  function trackOf(id){ try{ for(var t in TRACKS){ if(TRACKS[t].stages.some(function(s){return s.ids.indexOf(id)>=0;})) return t; } }catch(e){} return null; }
  async function persist(table,row,oc){ if(!userId) return; try{ row.user_id=userId; await sb.from(table).upsert(row, oc?{onConflict:oc}:undefined);}catch(e){console.warn('persist',table,e);} }
  var _complete = completeLesson;
  completeLesson = function(id){ _complete(id); if(!userId) return;
    if(typeof CE_LESSONS!=='undefined' && CE_LESSONS[id]) persist('ce_completions',{module_id:id,hours:CE_LESSONS[id].ceHours},'user_id,module_id');
    else persist('lesson_progress',{lesson_id:id,track:trackOf(id)},'user_id,lesson_id'); };
  var _grad = graduate;
  graduate = function(track){ _grad(track); if(!userId) return;
    persist('enrollments',{track:track},'user_id,track'); persist('graduations',{track:track},'user_id,track');
    try{ var sc=(typeof examScore==='function')?examScore():null; sb.from('exam_results').insert({user_id:userId,track:track,score:sc,passed:true}); }catch(e){}
    try{ trackIds(track).forEach(function(id){ persist('lesson_progress',{lesson_id:id,track:track},'user_id,lesson_id'); }); }catch(e){} };
  async function loadProgress(){ if(!userId) return; try{
      var lp=await sb.from('lesson_progress').select('lesson_id'); var gr=await sb.from('graduations').select('track'); var ce=await sb.from('ce_completions').select('module_id,hours');
      (lp.data||[]).forEach(function(r){ state.completed.add(r.lesson_id); }); (gr.data||[]).forEach(function(r){ state.gradTracks.add(r.track); });
      state.ceHours=0; state.ceDone=new Set(); (ce.data||[]).forEach(function(r){ state.ceDone.add(r.module_id); state.ceHours+=Number(r.hours)||0; });
      if(typeof render==='function') render();
    }catch(e){ console.warn('load',e); } }
  sb.auth.getSession().then(function(res){ var s=res.data.session; userId=s?s.user.id:null; renderBar(s?s.user.email:null); if(userId) loadProgress(); });
  sb.auth.onAuthStateChange(function(_e,s){ userId=s?s.user.id:null; renderBar(s?s.user.email:null); if(userId) loadProgress(); });
})();
</script>
